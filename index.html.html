<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門低碳生活模擬器 (電車增強版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0fdf4; }
        .input-group:hover { transform: translateX(5px); transition: all 0.2s; }
        input[type=number]:focus { border-color: #10b981; outline: none; ring: 2px ring-green-100; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-green-100">
        <div class="md:flex">
            <!-- 左側：輸入區 -->
            <div class="md:w-1/2 p-8 bg-white overflow-y-auto" style="max-height: 90vh;">
                <h1 class="text-3xl font-bold text-green-700 mb-2">🇲🇴 澳門碳足跡模擬器</h1>
                <p class="text-gray-500 mb-8 font-light">更新：已加入電動車(EV)與冷氣時數計算邏輯</p>

                <div class="space-y-8">
                    <!-- 衣 -->
                    <div class="input-group">
                        <label class="block text-sm font-bold text-gray-700 mb-2">👕 衣：每月購買新衣件數</label>
                        <input type="range" id="clothes" min="0" max="20" value="2" class="w-full h-2 bg-green-200 rounded-lg appearance-none cursor-pointer accent-green-600">
                        <div class="flex justify-between text-xs text-gray-500 mt-1"><span id="clothes-val" class="font-bold text-green-600">2</span> 件</div>
                    </div>

                    <!-- 食 -->
                    <div class="input-group">
                        <label class="block text-sm font-bold text-gray-700 mb-2">🍱 食：飲食方式</label>
                        <select id="diet" class="w-full p-3 border-2 border-green-50 rounded-xl bg-gray-50 focus:bg-white transition-all">
                            <option value="150">肉食愛好者 (餐餐有肉)</option>
                            <option value="100" selected>均衡飲食 (少量肉類)</option>
                            <option value="50">蛋奶素食</option>
                            <option value="30">全植物蔬食 (最環保)</option>
                        </select>
                    </div>

                    <!-- 住 -->
                    <div class="bg-blue-50 p-5 rounded-2xl space-y-4 border border-blue-100">
                        <h3 class="font-bold text-blue-800 flex items-center">🏠 住：電力消耗 (澳門標準)</h3>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">每月基本用電量 (不含冷氣, 度/kWh)</label>
                            <input type="number" id="elec" value="150" class="w-full p-2 rounded-lg border-2 border-transparent focus:border-blue-400">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">每日開啟空調時數 (小時)</label>
                            <input type="range" id="ac_hours" min="0" max="24" value="6" class="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                            <div class="text-xs text-blue-600 mt-1 font-bold"><span id="ac-val">6</span> 小時</div>
                        </div>
                    </div>

                    <!-- 行 (加入電動車) -->
                    <div class="bg-emerald-50 p-5 rounded-2xl space-y-4 border border-emerald-100">
                        <label class="block text-sm font-bold text-emerald-800">🚗 行：每月行駛里程 (公里/KM)</label>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <span class="text-[10px] font-bold text-gray-500 uppercase">燃油私家車</span>
                                <input type="number" id="car_km" value="100" class="w-full p-2 border rounded-lg">
                            </div>
                            <div>
                                <span class="text-[10px] font-bold text-blue-600 uppercase">⚡ 電動車 (EV)</span>
                                <input type="number" id="ev_km" value="0" class="w-full p-2 border rounded-lg border-blue-200">
                            </div>
                            <div>
                                <span class="text-[10px] font-bold text-gray-500 uppercase">巴士/輕軌</span>
                                <input type="number" id="bus_km" value="200" class="w-full p-2 border rounded-lg">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右側：結果與圖表 -->
            <div class="md:w-1/2 bg-slate-50 p-8 flex flex-col items-center justify-center">
                <div class="w-full max-w-sm">
                    <canvas id="carbonChart"></canvas>
                </div>
                
                <div class="text-center mt-8">
                    <p class="text-gray-400 font-medium">預估每月碳排放量</p>
                    <h2 class="text-6xl font-black text-green-600 my-2 tracking-tight"><span id="total-val">0</span> <span class="text-xl">kg</span></h2>
                    <div id="status-badge" class="px-6 py-1 rounded-full text-white text-sm font-bold inline-block shadow-lg">計算中...</div>
                </div>

                <!-- 環保金句 -->
                <div class="mt-10 p-5 bg-white rounded-2xl shadow-sm border-t-4 border-green-500 w-full relative">
                    <span class="absolute -top-3 left-6 bg-green-500 text-white text-[10px] px-2 py-0.5 rounded">小城貼士</span>
                    <p id="quote" class="text-gray-600 italic leading-relaxed text-sm pt-2">"載入中..."</p>
                </div>
            </div>
        </div>

        <!-- 替代方案推薦 -->
        <div class="p-8 bg-slate-900 text-white">
            <h3 class="text-2xl font-bold mb-8 flex items-center">
                <span class="bg-green-500 p-2 rounded-lg mr-3">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </span>
                澳門低碳生活替代方案
            </h3>
            <div class="grid md:grid-cols-3 gap-6" id="recommendations">
                <!-- JS 動態插入 -->
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('carbonChart').getContext('2d');
        let carbonChart;

        // 澳門計算係數
        const MO_ELEC_FACTOR = 0.7; // 0.7 kg/kWh
        const AC_POWER = 1.2;       // 1.5匹空調約 1.2kW
        const EV_EFFICIENCY = 0.18; // 電動車約 0.18 kWh/km

        function initChart() {
            carbonChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['衣', '食', '住', '行'],
                    datasets: [{
                        data: [0, 0, 0, 0],
                        backgroundColor: ['#f87171', '#fbbf24', '#60a5fa', '#10b981'],
                        hoverOffset: 30,
                        borderWidth: 8,
                        borderColor: '#f8fafc'
                    }]
                },
                options: {
                    cutout: '70%',
                    responsive: true,
                    plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } } },
                    animation: { animateScale: true, duration: 800 }
                }
            });
        }

        function calculate() {
            const clothes = parseFloat(document.getElementById('clothes').value) || 0;
            const diet = parseFloat(document.getElementById('diet').value) || 0;
            const elecBase = parseFloat(document.getElementById('elec').value) || 0;
            const acHours = parseFloat(document.getElementById('ac_hours').value) || 0;
            const carKm = parseFloat(document.getElementById('car_km').value) || 0;
            const evKm = parseFloat(document.getElementById('ev_km').value) || 0;
            const busKm = parseFloat(document.getElementById('bus_km').value) || 0;

            document.getElementById('clothes-val').innerText = clothes;
            document.getElementById('ac-val').innerText = acHours;

            // 計算分項
            const c_clothes = clothes * 7; 
            const c_food = diet; 
            const c_housing = (elecBase + (acHours * AC_POWER * 30)) * MO_ELEC_FACTOR;
            
            // 交通細分計算：燃油車(0.2) / 電動車(0.18*0.7=0.126) / 巴士(0.03)
            const c_transport = (carKm * 0.2) + (evKm * EV_EFFICIENCY * MO_ELEC_FACTOR) + (busKm * 0.03);

            const total = c_clothes + c_food + c_housing + c_transport;

            carbonChart.data.datasets[0].data = [
                c_clothes.toFixed(1), 
                c_food.toFixed(1), 
                c_housing.toFixed(1), 
                c_transport.toFixed(1)
            ];
            carbonChart.update();

            document.getElementById('total-val').innerText = Math.round(total);
            updateUI(total);
        }

        function updateUI(total) {
            const quoteEl = document.getElementById('quote');
            const badge = document.getElementById('status-badge');
            
            if(total > 500) {
                quoteEl.innerText = "「澳門夏季用電高峰期，您的排放偏高。建議減少使用乾衣機，改用陽光晾曬。」";
                badge.className = "px-6 py-1 rounded-full text-white text-sm font-bold inline-block bg-red-500 shadow-red-200 shadow-lg";
                badge.innerText = "需要改進";
            } else if(total > 200) {
                quoteEl.innerText = "「水平良好。若能將燃油私家車更換為電動車，或多利用輕軌，碳足跡將大幅下降。」";
                badge.className = "px-6 py-1 rounded-full text-white text-sm font-bold inline-block bg-orange-400 shadow-orange-200 shadow-lg";
                badge.innerText = "維持不錯";
            } else {
                quoteEl.innerText = "「非常出色的低碳生活！您是澳門綠色生活的推動者。」";
                badge.className = "px-6 py-1 rounded-full text-white text-sm font-bold inline-block bg-green-500 shadow-green-200 shadow-lg";
                badge.innerText = "環保達人";
            }

            const recContainer = document.getElementById('recommendations');
            const recs = [
                {
                    title: "推動電動出行",
                    desc: `目前您每月交通排放量約 ${((parseFloat(document.getElementById('car_km').value)||0)*0.2).toFixed(1)}kg。若轉用電動車並使用澳電(CEM)充電網絡，可減少約40%交通碳排。`,
                    icon: "⚡",
                    tag: "交通替代"
                },
                {
                    title: "當季在地飲食",
                    desc: "選擇紅街市或下環街市的本地及鄰近地區蔬食。減少購買進口牛肉，每餐可減少約 2kg 碳排放。",
                    icon: "🌽",
                    tag: "飲食建議"
                },
                {
                    title: "輕軌媽閣線",
                    desc: "從氹仔往返市區，優先考慮乘坐輕軌媽閣線。公共運輸的每人每公里碳排僅為私家車的 15%。",
                    icon: "🚇",
                    tag: "公共交通"
                }
            ];

            recContainer.innerHTML = recs.map(r => `
                <div class="bg-gray-800 p-6 rounded-2xl hover:border-green-500 border border-transparent transition-all group">
                    <span class="text-xs font-bold text-green-400 uppercase tracking-widest">${r.tag}</span>
                    <div class="text-4xl my-4 group-hover:scale-110 transition-transform">${r.icon}</div>
                    <h4 class="font-bold text-xl mb-2 text-white">${r.title}</h4>
                    <p class="text-sm text-gray-400 leading-relaxed">${r.desc}</p>
                </div>
            `).join('');
        }

        // 綁定所有輸入事件
        ['clothes', 'diet', 'elec', 'ac_hours', 'car_km', 'ev_km', 'bus_km'].forEach(id => {
            document.getElementById(id).addEventListener('input', calculate);
        });

        window.onload = () => {
            initChart();
            calculate();
        };
    </script>
</body>
</html>
